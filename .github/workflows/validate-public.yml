name: Validate Public Assignments

on:
  pull_request:
    paths:
      - "assignments/**"
      - "aprog.toml"
      - "templates/**"
      - "generated/**"
      - "src/**"

jobs:
  validate-public:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"
          cache: pip

      - name: Install AProg
        run: pip install -e .

      - name: Regenerate configs
        run: aprog generate-config --all --force

      - name: Fail if generated files were stale
        run: |
          if ! git diff --exit-code generated/; then
            echo ""
            echo "Generated files are out of date. Run 'aprog generate-config --all --force' locally and commit the result."
            exit 1
          fi

      - name: Validate all assignments
        run: aprog validate --all

      - name: Scan for private file leaks
        run: aprog scan-public --all
