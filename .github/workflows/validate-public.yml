name: Validate Public Assignments

on:
  pull_request:
    paths:
      - "assignments/**"
      - "aprog.toml"
      - "templates/**"
      - "generated/**"
      - "src/**"

jobs:
  validate-public:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up uv
        uses: astral-sh/setup-uv@v3
        with:
          python-version: "3.10"

      - name: Install AProg
        run: uv sync

      - name: Regenerate configs
        run: uv run aprog generate-config --all --force

      - name: Fail if generated files were stale
        run: |
          if ! git diff --exit-code generated/; then
            echo ""
            echo "Generated files are out of date. Run 'aprog generate-config --all --force' locally and commit the result."
            exit 1
          fi

      - name: Find changed assignments
        id: changed
        run: |
          slugs=$(git diff --name-only origin/${{ github.base_ref }}...HEAD \
            | grep '^assignments/' \
            | cut -d/ -f2 \
            | sort -u \
            | tr '\n' ' ')
          echo "slugs=$slugs" >> "$GITHUB_OUTPUT"

      - name: Validate changed assignments
        if: steps.changed.outputs.slugs != ''
        run: |
          for slug in ${{ steps.changed.outputs.slugs }}; do
            uv run aprog validate "$slug"
          done

      - name: Validate aprog.toml and templates (when touched)
        if: steps.changed.outputs.slugs == ''
        run: echo "No assignment directories changed -- skipping per-assignment validation."

      - name: Scan for private file leaks
        run: uv run aprog scan-public --all
