name: CI

on:
  push:
    branches: [main]
    paths:
      - "src/**"
      - "tests/**"
      - "activities/**"
      - "pyproject.toml"
      - ".github/workflows/ci.yml"
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up uv
        uses: astral-sh/setup-uv@v3
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: uv sync

      - name: Lint
        run: uv run ruff check src/ tests/

      - name: Type check
        run: uv run ty check src/

      - name: Test
        run: uv run pytest --no-testmon -m "not slow"

      - name: Activity structural tests
        run: uv run pytest tests/unit/test_real_activities.py -v
