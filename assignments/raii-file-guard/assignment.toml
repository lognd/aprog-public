[assignment]
slug        = "raii-file-guard"
name        = "RAII File Guard"
author      = "Logan Dapp"
description = "Implement FileGuard, a class whose constructor opens a POSIX file descriptor and whose destructor closes it, to learn RAII through file lifetime management."
version     = "0.1.0"
status      = "draft"

[classification]
language   = "cpp"
difficulty = "medium"
topics     = ["io", "memory-management"]
concepts   = ["object-oriented", "raii", "posix-file-io", "encapsulation"]
labels     = ["starter-code", "unit-tests", "requires-filesystem"]

[template]
slug = "cpp-header-impl"

[grader]
visibility        = "after_due_date"
stdout_visibility = "after_due_date"

[grader.dependencies]
system = ["cmake", "g++"]
