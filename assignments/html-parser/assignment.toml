[assignment]
slug        = "html-parser"
name        = "HTML Parser"
author      = "lognd"
description = "Implement a minimal 1970s-style HTML parser in C++ and write a Catch2 test suite that exercises every edge case in the spec."
version     = "0.1.0"
status      = "draft"

[classification]
language   = "cpp"
difficulty = "medium"
topics     = ["strings"]
concepts   = ["file-io", "stdin-stdout"]
labels     = ["starter-code"]

[template]
slug = "cpp-cmake"

[grader]
visibility        = "after_due_date"
stdout_visibility = "after_due_date"

[grader.dependencies]
system = ["cmake", "g++", "catch2"]
