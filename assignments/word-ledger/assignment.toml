[assignment]
slug        = "word-ledger"
name        = "Word Ledger"
author      = "lognd"
description = "Implement a small text-analysis toolkit over a vector of already-tokenized words, exercising std::map, std::unordered_map, std::set, and std::unordered_set: frequency counting, first-occurrence lookup, deduplication, set operations, and a top-k report."
version     = "0.1.0"
status      = "draft"

[classification]
language   = "cpp"
difficulty = "medium"
topics     = ["data-structures", "strings", "algorithms"]
concepts   = ["mutation", "iteration"]
labels     = ["starter-code"]

[template]
slug = "cpp-header-impl"

[grader]
visibility        = "after_due_date"
stdout_visibility = "after_due_date"

[grader.dependencies]
system = ["cmake", "g++"]
