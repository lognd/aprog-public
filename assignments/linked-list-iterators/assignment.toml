[assignment]
slug        = "linked-list-iterators"
name        = "Linked List Iterators"
author      = "lognd"
description = "Add a forward iterator to the LinkedList<T> you built last assignment: a nested Iterator/ConstIterator class wrapping a Node*, begin()/end() to make range-for work, and insert_after/erase_after/find_it, the classic singly-linked positional operations built on top of it."
version     = "0.1.0"
status      = "draft"

[classification]
language   = "cpp"
difficulty = "medium"
topics     = ["data-structures", "linked-lists", "memory-management"]
concepts   = ["pointers", "templates", "iteration", "raii"]
labels     = ["starter-code", "unit-tests", "multi-file"]

[template]
slug = "cpp-header-impl"

[grader]
visibility        = "after_due_date"
stdout_visibility = "after_due_date"

[grader.dependencies]
system = ["cmake", "g++", "valgrind"]
