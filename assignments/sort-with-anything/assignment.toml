[assignment]
slug        = "sort-with-anything"
name        = "Sort With Anything"
author      = "Logan Dapp"
description = "Generalize your merge sort into a template that accepts ANY comparator -- a free function, a functor, or a lambda -- plus generic filter, for_each_apply, and count_matching helpers built the same way. One algorithm, any callable."
version     = "0.1.0"
status      = "draft"

[classification]
language   = "cpp"
difficulty = "medium"
topics     = ["sorting", "algorithms"]
concepts   = ["templates", "functional", "iteration"]
labels     = ["starter-code"]

[template]
slug = "cpp-header-impl"

[grader]
visibility        = "after_due_date"
stdout_visibility = "after_due_date"

[grader.dependencies]
system = ["cmake", "g++"]
