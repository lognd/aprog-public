[assignment]
slug        = "pattern-toolkit"
name        = "Pattern Toolkit"
author      = "lognd"
description = "Starting from working-but-messy legacy code, refactor into three classic runtime-polymorphism design patterns -- Strategy, Observer, and Template Method -- each heap-free and built on abstract base classes and non-owning pointers."
version     = "0.1.0"
status      = "draft"

[classification]
language   = "cpp"
difficulty = "medium"
topics     = ["sorting", "algorithms"]
concepts   = ["object-oriented", "pointers"]
labels     = ["starter-code", "unit-tests", "multi-file"]

[template]
slug = "cpp-header-impl"

[grader]
visibility        = "after_due_date"
stdout_visibility = "after_due_date"

[grader.dependencies]
system = ["cmake", "g++"]
