[assignment]
slug        = "parse-with-grace"
name        = "Parse With Grace"
author      = "lognd"
description = "A small parsing library built exceptions-first: parse_int, parse_fraction, parse_int_list (with transparent error propagation), parse_int_or (a caller-side catch), and ScopedTally (RAII balance through unwinding)."
version     = "0.1.0"
status      = "draft"

[classification]
language   = "cpp"
difficulty = "medium"
topics     = ["strings"]
concepts   = ["raii"]
labels     = ["starter-code"]

[template]
slug = "cpp-header-impl"

[grader]
visibility        = "after_due_date"
stdout_visibility = "after_due_date"

[grader.dependencies]
system = ["cmake", "g++"]
