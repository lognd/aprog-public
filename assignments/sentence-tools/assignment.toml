[assignment]
slug        = "sentence-tools"
name        = "Sentence Tools"
author      = "lognd"
description = "Implement a small C-style string library that operates at the word level: counting, extracting, searching, and transforming words in a sentence."
version     = "0.1.0"
status      = "draft"

[classification]
language   = "cpp"
difficulty = "medium"
topics     = ["strings", "algorithms"]
concepts   = ["pointers"]
labels     = ["starter-code"]

[template]
slug = "cpp-header-impl"

[grader]
visibility        = "after_due_date"
stdout_visibility = "after_due_date"

[grader.dependencies]
system = ["cmake", "g++", "valgrind"]
